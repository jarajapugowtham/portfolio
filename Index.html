<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarajapu Gowtham | Full Stack Developer</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: #0a0f1f; color: #f1f5f9; font-family: system-ui; }
  .glass { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); backdrop-filter: blur(20px); border-radius: 20px; padding: 24px; }
  .gradient-text { background: linear-gradient(90deg, #60a5fa, #c084fc); -webkit-background-clip: text; color: transparent; }
  .btn { background: linear-gradient(90deg, #3b82f6, #8b5cf6); padding: 10px 20px; border-radius: 999px; color: white; font-weight: 600; }
</style>
</head>
<body class="p-6">
<div class="max-w-4xl mx-auto">

  <!-- HERO -->
  <div class="glass">
    <h1 class="text-5xl font-bold gradient-text">Jarajapu Gowtham</h1>
    <p class="text-xl mt-3">Full Stack Developer | MERN Stack</p>
    <p class="text-slate-400 mt-2">📍 Visakhapatnam, AP</p>
  </div>

  <!-- LIVE FULL STACK PROJECT -->
  <div class="glass mt-6">
    <h2 class="text-2xl font-bold">🚀 Live To-Do App - Full Stack</h2>
    <p class="text-slate-400">Backend: Node.js + Express | Frontend: HTML + JS</p>
    
    <div class="mt-4 flex gap-2">
      <input id="taskInput" placeholder="Add new task" class="bg-gray-800 p-3 rounded w-full text-white">
      <button onclick="addTodo()" class="btn">Add</button>
    </div>
    <div id="todoList" class="mt-4"></div>
  </div>

  <!-- CONTACT -->
  <div class="glass mt-6">
    <h2 class="text-2xl font-bold">Contact Me</h2>
    <form id="contactForm" class="mt-4 grid gap-3">
      <input id="name" placeholder="Your Name" class="bg-gray-800 p-3 rounded text-white">
      <input id="email" placeholder="Your Email" class="bg-gray-800 p-3 rounded text-white">
      <textarea id="msg" placeholder="Your Message" rows="3" class="bg-gray-800 p-3 rounded text-white"></textarea>
      <button type="submit" class="btn">Send Message</button>
    </form>
    <p id="formMsg" class="text-green-400 mt-2"></p>
  </div>

</div>

<script>
const API_URL = "https://your-backend-url.onrender.com/api"; // Ippudu temporary. Tarvata backend deploy chesi URL marchudam

// Load Todos
async function loadTodos(){
  try{
    const res = await fetch(`${API_URL}/todos`);
    const todos = await res.json();
    document.getElementById('todoList').innerHTML = todos.map(t => 
      `<p class="glass p-3 mb-2">${t.task}</p>`
    ).join('');
  }catch(e){
    document.getElementById('todoList').innerHTML = `<p class="text-red-400">Backend not live yet. Deploy chesaka work avutundi</p>`
  }
}

// Add Todo
async function addTodo(){
  const task = document.getElementById('taskInput').value;
  await fetch(`${API_URL}/todos`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({task})
  });
  document.getElementById('taskInput').value = "";
  loadTodos();
}

// Contact Form
document.getElementById('contactForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const data = {name: name.value, email: email.value, message: msg.value};
  await fetch(`${API_URL}/contact`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  document.getElementById('formMsg').innerText = "Message Sent!";
  e.target.reset();
});

loadTodos();
</script>
</body>
  </html>
